- name: Deploy Kestrel-gpu
  hosts: localhost

  vars:
    NSP_system_name: kestrel-gpu
    NSP_install_root: "{{ ['/nopt/nlr/apps/', NSP_system_name] | path_join }}"
    NSP_scratch_directory: "{{ ['/scratch', ansible_user_id, 'gpu_build'] | path_join }}"
    NSP_help_email: walid.arsalane@nrel.gov
    NSP_site_name: NREL
      

  roles: 
    - role: init
    #- role: cpe 
    - role: cuda
      vars:
        NSP_CUDA_version: '12.8.1'
        NSP_CUDA_driver: '570.124.06'
    - role: lmod
      vars:
        NSP_LMOD_install_type: internal
        NSP_LMOD_version: 8.7.37
        NSP_LMOD_enable_tcl: true
        NSP_LMOD_path_names:
          ${NSP_install_root}/cpe-deps: "[ CPE thirdparty Dependencies ]"      
          ${NSP_install_root}/apps_modules/26.05: "[ Research Applications ]"
          /opt/cray/pe/lmod/modulefiles/craype-targets/default: " [ Optimization Flags ] "
          /opt/cray/pe/lmod/modulefiles/core: "[ Cray Programming Environment  ]"
          ${NSP_install_root}/craympich_packages: "[ Cray-Mpich apps  ]"
        NSP_LMOD_nv_mappings:
          llvm/19.1.0: {name: clang, version: "%s"}
          gcc-native/12.1: {name: gcc, version: "12.2.1"}
          oneapi/2025.3.1: {name: intel-oneapi-compilers, version: "2025.3.2"}
          oneapi/2024.1.0: {name: intel-oneapi-compilers, version: "2025.1.2"}
          nvhpc/22.7: {name: nvhpc, version: "25.11"}
          nvhpc/23.3: {name: nvhpc, version: "25.11"}
          nvhpc/24.3: {name: nvhpc, version: "25.11"}
          nvhpc/26.1: {name: nvhpc, version: "25.11"}
        NSP_LMOD_enable_logging: True
        NSP_LMOD_logging_url: "http://localhost:8080/"
        NSP_LMOD_DefApps_modules:
          - Core/26.05
        NSP_LMOD_hierarchy:
          compiler:
            members: [ gcc, oneapi, llvm, aocc, nvhpc ]
            paths:
              - {path: '|compiler.name|-|compiler.version|', weight: 20}
              - {path: '|mpi.name|-|mpi.version|/|compiler.name|-|compiler.version|', weight: 30}
            level: 0
          mpi:
            members: [ openmpi, mpich, intel-oneapi-mpi, cray-mpich ]
            paths:
              - {path: '|mpi.name|-|mpi.version|/|compiler.name|-|compiler.version|', weight: 30}
            level: 1
          gpu:
            members: [ cuda ]
            paths:
              - {path: '|gpu.name|-|gpu.version|/|compiler.name|-|compiler.version|', weight: 30}
              - {path: '|mpi.name|-|mpi.version|/|gpu.name|-|gpu.version|/|compiler.name|-|compiler.version|', weight: 40}
              - {path: '|gpu.name|-|gpu.version|/|mpi.name|-|mpi.version|/|compiler.name|-|compiler.version|', weight: 40}
            level: 2
    - role: miniforge3
      vars:
        NSP_MINIFORGE3_version: 26.1.1
        NSP_MINIFORGE3_revision: 3
    - role: aocc 
      vars:
        NSP_AOCC_version: "5.0.0"
    - role: llvm
      vars:
        NSP_LLVM_version: 19.1.0
    - role: gcc
      vars:
        NSP_GCC_version: 14.2.0
    - role: oneapi
      vars:
        NSP_ONEAPI_hpc_toolkit_url: 'https://registrationcenter-download.intel.com/akdlm/IRC_NAS/f59a79aa-4a6e-46e8-a6c2-be04bb13f274/intel-oneapi-hpc-toolkit-2025.3.1.55_offline.sh'
        NSP_ONEAPI_base_toolkit_url: 'https://registrationcenter-download.intel.com/akdlm/IRC_NAS/6caa93ca-e10a-4cc5-b210-68f385feea9e/intel-oneapi-base-toolkit-2025.3.1.36_offline.sh'
        NSP_ONEAPI_version: 2025.3.1
